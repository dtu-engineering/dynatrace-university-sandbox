---

- name: Ensure easytrade namespace exists
  shell: |
    kubectl get namespace easytrade || kubectl create namespace easytrade
  register: easytrade_ns
  changed_when: "'created' in easytrade_ns.stdout"

# https://github.com/Dynatrace/easytrade/tree/main/kubernetes-manifests/release

- name: Ensure kubernetes-manifests directory exists
  ansible.builtin.file:
    path: "{{ role_path }}/files/kubernetes-manifests"
    state: directory
    mode: "0755"

- name: Render all Kubernetes manifest templates
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ role_path }}/files/kubernetes-manifests/{{ item | basename | regex_replace('\\.j2$', '') }}"
    mode: "0644"
  with_fileglob:
    - "{{ role_path }}/templates/*.j2"

- name: Apply easytrade release manifests
  shell: |
    kubectl -n easytrade apply -f "{{ role_path }}/files/kubernetes-manifests"
  register: easytrade_apply
  retries: 10
  delay: 6
  until: easytrade_apply.rc == 0

- name: Wait for Easytrade deployments to exist
  shell: kubectl -n easytrade get deployment
  register: easytrade_deployments
  retries: 10
  delay: 3
  until: easytrade_deployments.rc == 0

- name: Ensure ingress directory exists
  ansible.builtin.file:
    path: "{{ role_path }}/files/kubernetes-manifests/ingress"
    state: directory
    mode: "0755"

- name: Template Easytrade ingress
  ansible.builtin.template:
    src: ingress/easytrade-ingress.yaml.j2
    dest: "{{ role_path }}/files/kubernetes-manifests/ingress/easytrade-ingress.yaml"
    mode: "0644"

- name: Apply Easytrade ingress
  shell: kubectl apply -f "{{ role_path }}/files/kubernetes-manifests/ingress/easytrade-ingress.yaml"

- name: Pause for easytrade deployment
  pause:
    seconds: 120

- name: Count all Easytrade pods
  shell: |
    kubectl -n easytrade get pods --no-headers | wc -l
  register: easytrade_pod_count
  retries: 20
  delay: 10
  until: easytrade_pod_count.stdout | int > 0

- name: Wait for all Easytrade pods to be Running and Ready
  shell: |
    kubectl -n easytrade get pods -o json \
    | jq '[.items[] 
           | select(.status.phase=="Running") 
           | select(all(.status.containerStatuses[]; .ready==true))
          ] | length'
  register: easytrade_ready_count
  retries: 30
  delay: 15
  until: easytrade_ready_count.stdout | int == (easytrade_pod_count.stdout | int)

- name: Pause for easytrade to settle
  pause:
    seconds: 300