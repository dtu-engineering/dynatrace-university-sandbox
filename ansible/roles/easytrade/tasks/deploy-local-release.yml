---

- name: Ensure easytrade namespace exists
  shell: |
    kubectl get namespace easytrade || kubectl create namespace easytrade
  register: easytrade_ns
  changed_when: "'created' in easytrade_ns.stdout"

# https://github.com/Dynatrace/easytrade/tree/main/kubernetes-manifests/release

- name: Ensure kubernetes-manifests directory exists
  ansible.builtin.file:
    path: "{{ role_path }}/files/kubernetes-manifests"
    state: directory
    mode: "0755"

- name: Render all Kubernetes manifest templates
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ role_path }}/files/kubernetes-manifests/{{ item | basename | regex_replace('\\.j2$', '') }}"
    mode: "0644"
  with_fileglob:
    - "{{ role_path }}/templates/*.j2"

- name: Apply easytrade release manifests
  shell: |
    kubectl -n easytrade apply -f "{{ role_path }}/files/kubernetes-manifests"
  register: easytrade_apply
  retries: 10
  delay: 6
  until: easytrade_apply.rc == 0

- name: Wait for Easytrade deployments to exist
  shell: kubectl -n easytrade get deployment
  register: easytrade_deployments
  retries: 10
  delay: 3
  until: easytrade_deployments.rc == 0

- name: Deploy Kubernetes Ingress
  include_tasks: apply-ingress.yml

- name: Verify Easytrade Deployment
  include_tasks: verify-deployment.yml