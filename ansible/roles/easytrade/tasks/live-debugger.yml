---

# https://docs.dynatrace.com/docs/observe/application-observability/live-debugger/additional-settings#integrate-with-your-version-control

- name: Get EasyTrade git remote origin
  ansible.builtin.shell: |
    git -C "{{ role_path }}/files/easytrade" remote get-url origin
  register: easytrade_remote_origin
  changed_when: false

- name: Get EasyTrade git commit SHA for pinned release
  ansible.builtin.shell: |
    git -C "{{ role_path }}/files/easytrade" rev-parse HEAD
  register: easytrade_git_commit
  changed_when: false

- name: Ensure configmap directory exists
  ansible.builtin.file:
    path: "{{ role_path }}/files/easytrade/kubernetes-manifests/configmap"
    state: directory
    mode: "0755"

- name: Template Configmap
  ansible.builtin.template:
    src: configmap/livedebugger-configmap.yaml.j2
    dest: "{{ role_path }}/files/easytrade/kubernetes-manifests/configmap/livedebugger-configmap.yaml"
    mode: "0644"

- name: Apply Live Debugger ConfigMap
  ansible.builtin.shell: |
    kubectl apply -f "{{ role_path }}/files/easytrade/kubernetes-manifests/configmap/livedebugger-configmap.yaml"

- name: Inject Live Debugger env from ConfigMap into EasyTrade deployments
  ansible.builtin.shell: |
    kubectl -n "{{ easytrade_namespace }}" set env deployment --all --from=configmap/easytrade-livedebugger
  changed_when: true

- name: Pause for deployment
  pause:
    seconds: 30

- name: Print Live Debugger env vars from frontend
  ansible.builtin.shell: |
    kubectl -n "{{ easytrade_namespace }}" exec deploy/frontend -- printenv | grep DT_LIVEDEBUGGER
  register: livedebugger_env
  changed_when: false
  failed_when: false

- ansible.builtin.debug:
    msg: "{{ livedebugger_env.stdout_lines }}"