---

- name: Deploy Unguard
  include_tasks: deploy.yml

- name: Apply Live Debugger Environment Variables
  include_tasks: live-debugger.yml

- name: Deploy Kubernetes Ingress
  include_tasks: ingress.yml

- name: Verify Unguard Application
  include_role:
    name: app-availability
  vars:
    verify_url: "https://unguard.{{ ingress_domain }}/ui"
