---

- name: Ensure sandbox directory exists
  ansible.builtin.file:
    path: "/home/{{ instance_user }}/sandbox"
    state: directory
    mode: "0755"

# https://coder.com/docs/code-server/install#standalone-releases
- name: Source code-server deb
  ansible.builtin.get_url:
    url: "https://github.com/coder/code-server/releases/download/v{{vscode_version}}/code-server_{{vscode_version}}_amd64.deb"
    dest: /tmp/code-server_{{vscode_version}}_amd64.deb

- name: Install code-server deb
  become: true
  ansible.builtin.apt:
    deb: "/tmp/code-server_{{ vscode_version }}_amd64.deb"
    state: present

- name: Enable and start code-server service
  become: true
  ansible.builtin.shell: |
    systemctl enable code-server@{{ instance_user }}
    systemctl start code-server@{{ instance_user }}

- name: Configure VSCode
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "/home/{{ instance_user }}/.config/code-server/config.yaml"
    mode: 0600

- name: Ensure manifests directory exists
  ansible.builtin.file:
    path: "{{ role_path }}/files/kubernetes-manifests"
    state: directory
    mode: "0755"

- name: Template code-server ingress
  ansible.builtin.template:
    src: code-server-ingress.yaml.j2
    dest: "{{ role_path }}/files/kubernetes-manifests/code-server-ingress.yaml"
    mode: "0644"

- name: Template code-server service
  ansible.builtin.template:
    src: code-server-service.yaml.j2
    dest: "{{ role_path }}/files/kubernetes-manifests/code-server-service.yaml"
    mode: "0644"

- name: Template code-server Endpoints (bridge)
  ansible.builtin.template:
    src: code-server-endpoints.yaml.j2
    dest: "{{ role_path }}/files/kubernetes-manifests/code-server-endpoints.yaml"
    mode: "0644"

- name: Ensure vscode namespace exists
  shell: |
    kubectl get namespace "{{ vscode_namespace }}" || kubectl create namespace "{{ vscode_namespace }}"
  register: vscode_ns
  changed_when: "'created' in vscode_ns.stdout"

- name: Apply code-server service
  ansible.builtin.shell: |
    kubectl apply -f "{{ role_path }}/files/kubernetes-manifests/code-server-service.yaml"

- name: Apply code-server endpoints
  ansible.builtin.shell: |
    kubectl apply -f "{{ role_path }}/files/kubernetes-manifests/code-server-endpoints.yaml"

- name: Apply code-server ingress
  ansible.builtin.shell: |
    kubectl apply -f "{{ role_path }}/files/kubernetes-manifests/code-server-ingress.yaml"

- name: Create VS Code user data directory
  file:
    path: "/home/{{ instance_user }}/.local/share/code-server/User"
    state: directory
    owner: "{{ instance_user }}"
    group: "{{ instance_user }}"
    mode: "0755"

- name: Configure VS Code user settings (theme and preferences)
  template:
    src: settings.json.j2
    dest: "/home/{{ instance_user }}/.local/share/code-server/User/settings.json"
    owner: "{{ instance_user }}"
    group: "{{ instance_user }}"
    mode: "0644"

- name: Install local code-server extensions
  ansible.builtin.shell: |
    code-server --install-extension {{ role_path }}/files/vscode/extensions/{{ item }}
  loop: "{{ vscode_local_extensions }}"

- name: Restart VSCode
  become: true
  ansible.builtin.shell: |
    systemctl restart code-server@{{ instance_user }}