---

- name: Get instance user UID
  ansible.builtin.command: "id -u {{ instance_user }}"
  register: uid
  changed_when: false
  become: true

- name: Get instance user GID
  ansible.builtin.command: "id -g {{ instance_user }}"
  register: gid
  changed_when: false
  become: true

- name: Set facts
  ansible.builtin.set_fact:
    instance_user_uid: "{{ uid.stdout | int }}"
    instance_user_gid: "{{ gid.stdout | int }}"
    instance_user_home: "/home/{{ instance_user }}"
  changed_when: false

- name: Ensure vscode namespace exists
  ansible.builtin.command: kubectl get namespace "{{ vscode_namespace }}"
  register: vscode_ns_get
  changed_when: false
  failed_when: false

- name: Create vscode namespace if missing
  ansible.builtin.command: kubectl create namespace "{{ vscode_namespace }}"
  when: vscode_ns_get.rc != 0
  register: vscode_ns_create
  changed_when: vscode_ns_create.rc == 0

- name: Template vscode auth secret manifest
  template:
    src: "{{ role_path }}/templates/vscode-auth-secret.yaml.j2"
    dest: "{{ role_path }}/files/vscode-auth-secret.yaml"
    mode: "0600"
  no_log: true

- name: Apply vscode auth secret manifest
  ansible.builtin.shell: |
    kubectl apply -f "{{ role_path }}/files/vscode-auth-secret.yaml" -n "{{ vscode_namespace }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: vscode_secret_apply
  changed_when: >
    'configured' in vscode_secret_apply.stdout or
    'created' in vscode_secret_apply.stdout


- name: Template vscode-values 
  template:
    src: "{{ role_path }}/templates/vscode-values.yaml.j2"
    dest: "{{ role_path }}/files/vscode-values.yaml"
    mode: "0644"

# https://coder.com/docs/code-server/install#helm
- name: Install Local VSCode Helm chart
  ansible.builtin.shell: |
    helm upgrade --install vscode \
      {{ role_path }}/files/helm-chart \
      --namespace "{{ vscode_namespace }}" \
      --create-namespace \
      --wait \
      --timeout 30m \
      -f "{{ role_path }}/files/vscode-values.yaml"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: vscode_install
  changed_when: >
    'STATUS: deployed' in vscode_install.stdout or
    'STATUS: upgraded' in vscode_install.stdout
